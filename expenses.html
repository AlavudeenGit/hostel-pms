<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expenses · Malabar Muslim Association Register</title>
    <link rel="icon" type="image/png" href="asset/images/MMA_LOGO.png" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <script>
      (function () {
        var t = localStorage.getItem("pms_theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main">
        <header class="topbar" id="topbar"></header>
        <main class="content">
          <div class="page-head">
            <div>
              <div class="eyebrow">Manage</div>
              <h1>Expenses</h1>
            </div>
            <button class="btn btn-primary" id="add-expense-btn">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 5v14M5 12h14" />
              </svg>
              Add Expense
            </button>
          </div>

          <div
            class="grid-cards"
            id="expense-stats"
            style="margin-bottom: var(--space-5)"
          ></div>

          <div class="grid-2">
            <div class="card card-pad">
              <div class="toolbar">
                <div class="tb-search">
                  <svg
                    width="16"
                    height="16"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                  >
                    <circle cx="11" cy="11" r="7" />
                    <path d="m21 21-3.8-3.8" />
                  </svg>
                  <input
                    type="text"
                    id="e-search"
                    placeholder="Search expense, paid to…"
                  />
                </div>
                <select class="tb-filter" id="filter-category">
                  <option value="">All categories</option>
                </select>
              </div>
              <div class="table-wrap stack-mobile">
                <table class="reg-table">
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Name</th>
                      <th>Category</th>
                      <th>Paid To</th>
                      <th>Amount</th>
                      <th>Method</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="expenses-tbody"></tbody>
                </table>
              </div>
              <div id="expenses-empty"></div>
            </div>

            <div class="card card-pad">
              <div class="card-head"><h3>By category</h3></div>
              <div class="chart-box"><canvas id="chart-category"></canvas></div>
            </div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script type="module" src="js/expenses.js"></script>
  </body>
</html>
