<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings · Malabar Muslim Association Register</title>
    <link rel="icon" type="image/png" href="asset/images/MMA_LOGO.png" />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/dashboard.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <script>
      (function () {
        var t = localStorage.getItem("pms_theme");
        if (t) document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar"></aside>
      <div class="main">
        <header class="topbar" id="topbar"></header>
        <main class="content">
          <div class="page-head">
            <div>
              <div class="eyebrow">Insights</div>
              <h1>Settings</h1>
            </div>
          </div>

          <div class="grid-2">
            <div class="card card-pad">
              <div class="card-head">
                <div>
                  <h3>Hostel details</h3>
                  <div class="card-sub">Shown on receipts and reports</div>
                </div>
              </div>
              <div class="form-grid">
                <div class="f-field span-2">
                  <label>Hostel Name</label><input type="text" id="s-name" />
                </div>
                <div class="f-field">
                  <label>Owner Name</label><input type="text" id="s-owner" />
                </div>
                <div class="f-field">
                  <label>Phone Number</label><input type="tel" id="s-phone" />
                </div>
                <div class="f-field span-2">
                  <label>Address</label><textarea id="s-address"></textarea>
                </div>
              </div>
            </div>

            <div class="card card-pad">
              <div class="card-head">
                <div>
                  <h3>Rent & charges</h3>
                  <div class="card-sub">
                    Used automatically when generating payments
                  </div>
                </div>
              </div>
              <div class="form-grid">
                <div class="f-field">
                  <label>Student Rent — 2-Sharing (₹)</label
                  ><input type="number" id="s-student2" />
                </div>
                <div class="f-field">
                  <label>Student Rent — 3-Sharing (₹)</label
                  ><input type="number" id="s-student3" />
                </div>
                <div class="f-field">
                  <label>Employee Rent — 2-Sharing (₹)</label
                  ><input type="number" id="s-emp2" />
                </div>
                <div class="f-field">
                  <label>Employee Rent — 3-Sharing (₹)</label
                  ><input type="number" id="s-emp3" />
                </div>
                <!-- <div class="f-field">
                  <label>Bike Charge (₹)</label
                  ><input type="number" id="s-bike" />
                </div>-->
                <div class="f-field">
                  <label>Mess Charge Default (₹)</label
                  ><input type="number" id="s-mess" />
                </div> 
              </div>
            </div>
          </div>

          <div
            style="
              margin-top: var(--space-5);
              display: flex;
              justify-content: flex-end;
            "
          >
            <button class="btn btn-primary" id="save-settings-btn">
              Save settings
            </button>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="js/settings.js"></script>
  </body>
</html>
